<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; }
  .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #161b22; border-right: 1px solid #30363d; padding: 20px 0; }
  .sidebar h1 { font-size: 18px; padding: 0 20px 20px; color: #58a6ff; border-bottom: 1px solid #30363d; }
  .sidebar a { display: block; padding: 10px 20px; color: #8b949e; text-decoration: none; }
  .sidebar a:hover, .sidebar a.active { color: #c9d1d9; background: #21262d; }
  .main { margin-left: 220px; padding: 30px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 16px; margin-bottom: 12px; color: #58a6ff; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #21262d; }
  th { color: #8b949e; font-weight: 600; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
  .badge-green { background: #238636; color: #fff; }
  .badge-yellow { background: #9e6a03; color: #fff; }
</style>
</head>
<body>
<nav class="sidebar">
  <h1>Hermes</h1>
  <a href="#" class="active" onclick="loadPage('home')">Home</a>
  <a href="#" onclick="loadPage('sessions')">Sessions</a>
  <a href="#" onclick="loadPage('config')">Settings</a>
  <a href="#" onclick="loadPage('skills')">Skills</a>
  <a href="#" onclick="loadPage('gateways')">Gateway</a>
</nav>
<div class="main" id="content">
  <div class="card">
    <h2>Hermes Agent Dashboard</h2>
    <p>Manage sessions, settings, skills, and gateway platforms.</p>
  </div>
</div>
<script>
async function loadPage(page) {
  const el = document.getElementById('content');
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  event.target.classList.add('active');
  try {
    const resp = await fetch('/api/' + page);
    const data = await resp.json();
    if (page === 'sessions') el.innerHTML = renderSessions(data);
    else if (page === 'config') el.innerHTML = renderConfig(data);
    else if (page === 'skills') el.innerHTML = renderSkills(data);
    else if (page === 'gateways') el.innerHTML = renderGateways(data);
    else el.innerHTML = '<div class="card"><h2>Home</h2><p>Welcome to Hermes Dashboard</p></div>';
  } catch(e) { el.innerHTML = '<div class="card"><h2>Error</h2><p>'+e.message+'</p></div>'; }
}
function renderSessions(d) { return '<div class="card"><h2>Sessions</h2><pre>'+JSON.stringify(d,null,2)+'</pre></div>'; }
function renderConfig(d) { return '<div class="card"><h2>Settings</h2><pre>'+JSON.stringify(d,null,2)+'</pre></div>'; }
function renderSkills(d) { return '<div class="card"><h2>Skills</h2><pre>'+JSON.stringify(d,null,2)+'</pre></div>'; }
function renderGateways(d) { return '<div class="card"><h2>Gateway</h2><pre>'+JSON.stringify(d,null,2)+'</pre></div>'; }
</script>
</body>
</html>

site_name: HermesX
site_url: https://Colin4k1024.github.io/hermesx/
site_description: Enterprise Agent Runtime & Multi-Tenant SaaS Control Plane
repo_url: https://github.com/Colin4k1024/hermesx
repo_name: Colin4k1024/hermesx
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 HermesX

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Getting Started: 快速开始
            SaaS Quickstart: SaaS 快速开始
            Configuration: 配置说明
            Authentication: 认证
            Architecture: 架构
            Overview: 架构概览
            Database: 数据库
            Security Model: 安全模型
            RBAC Matrix: RBAC 矩阵
            Enterprise Readiness: 企业就绪
            Operations: 运维
            Deployment: 部署
            Observability: 可观测性
            Skills Guide: 技能指南
            API Reference: API 参考
            ADRs: 架构决策
            ADR-002 Dual-Layer Rate Limiter: ADR-002 双层限流器
            ADR-003 WebUI Vue3 Incremental: ADR-003 WebUI Vue3 增量
            ADR-004 WebUI Multipage Vite: ADR-004 WebUI 多页面 Vite
            ADR-005 WebUI Bootstrap Endpoint: ADR-005 WebUI 引导端点
            Changelog: 更新日志

extra:
  alternate:
    - name: English
      link: /hermesx/
      lang: en
    - name: 中文
      link: /hermesx/zh/
      lang: zh

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started:
    - SaaS Quickstart: saas-quickstart.md
    - Configuration: configuration.md
    - Authentication: authentication.md
  - Architecture:
    - Overview: architecture.md
    - Database: database.md
    - Security Model: SECURITY_MODEL.md
    - RBAC Matrix: RBAC_MATRIX.md
    - Enterprise Readiness: ENTERPRISE_READINESS.md
  - Operations:
    - Deployment: deployment.md
    - Observability: observability.md
    - Skills Guide: skills-guide.md
  - API Reference: api-reference.md
  - ADRs:
    - ADR-002 Dual-Layer Rate Limiter: adr/ADR-002-dual-layer-rate-limiter.md
    - ADR-003 WebUI Vue3 Incremental: adr/ADR-003-hermesx-webui-vue3-incremental.md
    - ADR-004 WebUI Multipage Vite: adr/ADR-004-hermesx-webui-multipage-vite.md
    - ADR-005 WebUI Bootstrap Endpoint: adr/ADR-005-hermesx-webui-bootstrap-endpoint.md
  - Changelog: CHANGELOG.md

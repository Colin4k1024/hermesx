site_name: HermesX
site_url: https://Colin4k1024.github.io/hermesx/
site_description: Enterprise Agent Runtime & Multi-Tenant SaaS Control Plane
repo_url: https://github.com/Colin4k1024/hermesx
repo_name: Colin4k1024/hermesx
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 HermesX

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
        - locale: en
          name: English
          build: true
          fallback_to_default: true
          nav_translations:
            首页: Home
            快速开始: Getting Started
            SaaS 快速开始: SaaS Quickstart
            配置说明: Configuration
            认证: Authentication
            架构: Architecture
            架构概览: Overview
            数据库: Database
            安全模型: Security Model
            RBAC 矩阵: RBAC Matrix
            企业就绪: Enterprise Readiness
            运维: Operations
            部署: Deployment
            可观测性: Observability
            技能指南: Skills Guide
            API 参考: API Reference
            架构决策: ADRs
            ADR-002 双层限流器: ADR-002 Dual-Layer Rate Limiter
            ADR-003 WebUI Vue3 增量: ADR-003 WebUI Vue3 Incremental
            ADR-004 WebUI 多页面 Vite: ADR-004 WebUI Multipage Vite
            ADR-005 WebUI 引导端点: ADR-005 WebUI Bootstrap Endpoint
            更新日志: Changelog

extra:
  alternate:
    - name: 中文
      link: /hermesx/
      lang: zh
    - name: English
      link: /hermesx/en/
      lang: en

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - 首页: index.md
  - 快速开始:
    - SaaS 快速开始: saas-quickstart.md
    - 配置说明: configuration.md
    - 认证: authentication.md
  - 架构:
    - 架构概览: architecture.md
    - 数据库: database.md
    - 安全模型: SECURITY_MODEL.md
    - RBAC 矩阵: RBAC_MATRIX.md
    - 企业就绪: ENTERPRISE_READINESS.md
  - 运维:
    - 部署: deployment.md
    - 可观测性: observability.md
    - 技能指南: skills-guide.md
  - API 参考: api-reference.md
  - 架构决策:
    - ADR-002 双层限流器: adr/ADR-002-dual-layer-rate-limiter.md
    - ADR-003 WebUI Vue3 增量: adr/ADR-003-hermesx-webui-vue3-incremental.md
    - ADR-004 WebUI 多页面 Vite: adr/ADR-004-hermesx-webui-multipage-vite.md
    - ADR-005 WebUI 引导端点: adr/ADR-005-hermesx-webui-bootstrap-endpoint.md
  - 更新日志: CHANGELOG.md

services:
  postgres:
    image: postgres:16
    container_name: hermesx-pg
    environment:
      POSTGRES_DB: hermesx
      POSTGRES_USER: hermesx
      POSTGRES_PASSWORD: hermesx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermesx"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: hermesx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hermesx-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hermesx
      MINIO_ROOT_PASSWORD: hermesxpass
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  hermesx-gateway:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: hermesx-gateway
    command: ["gateway", "start"]
    environment:
      # Storage
      DATABASE_URL: postgres://hermesx:hermesx@postgres:5432/hermesx?sslmode=disable
      DATABASE_DRIVER: postgres
      REDIS_URL: redis://redis:6379
      # MinIO (S3-compatible object storage)
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: hermesx
      MINIO_SECRET_KEY: hermesxxpass
      MINIO_BUCKET: hermes-skills
      # API server
      HERMES_API_PORT: "8080"
      HERMES_API_KEY: ${HERMES_API_KEY:-test-secret-key}
      # LLM credentials (from .env file)
      HERMES_MODEL: ${HERMES_MODEL:-}
      HERMES_PROVIDER: ${HERMES_PROVIDER:-}
      HERMES_BASE_URL: ${HERMES_BASE_URL:-}
      HERMES_API_KEY_LLM: ${HERMES_API_KEY_LLM:-}
      HERMES_API_MODE: ${HERMES_API_MODE:-}
      HERMES_MAX_ITERATIONS: ${HERMES_MAX_ITERATIONS:-20}
      HERMES_MAX_TOKENS: ${HERMES_MAX_TOKENS:-4096}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  redis_data:
  minio_data:

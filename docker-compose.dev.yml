# docker-compose.dev.yml — Full local deployment: app + infra + monitoring
# Usage: docker compose -f docker-compose.dev.yml up -d --build
#
# Services:
#   - hermesx-saas:   Go API + embedded WebUI (port 18080)
#   - postgres:       PostgreSQL 16 (port 5433)
#   - redis:          Redis 7 (port 6380)
#   - minio:          MinIO object storage (API: 9000, Console: 9002)
#   - prometheus:     Metrics collection (port 9090)
#   - grafana:        Dashboards (port 3001)
#   - jaeger:         Distributed tracing UI (port 16686)
#   - otel-collector: Telemetry pipeline (OTLP gRPC: 4317, HTTP: 4318)

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: hermesx-pg
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermes}
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermes_local_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: hermesx-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: hermesx-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9002:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Application ───────────────────────────────────────────────────────────
  hermesx-saas:
    build:
      context: .
      dockerfile: Dockerfile.saas
    container_name: hermesx-saas
    command: ["saas-api"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes_local_dev}@postgres:5432/${POSTGRES_DB:-hermes}?sslmode=disable
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-hermes-skills}
      MINIO_USE_SSL: "false"
      SAAS_API_PORT: "8080"
      SAAS_ALLOWED_ORIGINS: ${SAAS_ALLOWED_ORIGINS:-*}
      SAAS_STATIC_DIR: /static
      HERMES_ACP_TOKEN: ${HERMES_ACP_TOKEN:-local-dev-acp-token-32chars-minimum}
      HERMES_API_KEY: ${HERMES_API_KEY:-local-dev-api-key-32chars-minimum}
      HERMES_API_PORT: "8081"
      LLM_API_URL: ${LLM_API_URL:-http://host.docker.internal:11434}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      LLM_MODEL: ${LLM_MODEL:-llama3.2}
      HERMES_MODEL: ${HERMES_MODEL:-llama3.2}
      HERMES_PROVIDER: ${HERMES_PROVIDER:-openai}
      HERMES_BASE_URL: ${HERMES_BASE_URL:-}
      HERMES_API_KEY_LLM: ${HERMES_API_KEY_LLM:-}
      HERMES_API_MODE: ${HERMES_API_MODE:-openai}
      HERMES_DEBUG: ${HERMES_DEBUG:-false}
      HERMESX_ALLOW_SUPERUSER: "true"
      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: hermesx-saas
    volumes:
      - ./skills:/home/hermesx/skills:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "18080:8080"
      - "18081:8081"
    restart: unless-stopped

  # ─── Observability ─────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: hermesx-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./deploy/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4327:4317"
      - "4328:4318"
      - "8899:8889"
      - "8898:8888"
    depends_on:
      - jaeger
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: hermesx-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.0
    container_name: hermesx-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-hermesx}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - default
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: hermesx-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: "badger"
      BADGER_EPHEMERAL: "true"
      BADGER_DIRECTORY_VALUE: "/tmp/badger/data"
      BADGER_DIRECTORY_KEY: "/tmp/badger/key"
    volumes: []
    ports:
      - "16687:16686"
      - "14269:14268"
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  default:
    name: hermesx-local
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  jaeger_data:

limit_req_zone $binary_remote_addr zone=bootstrap:10m rate=5r/m;

upstream hermes_backend {
    ip_hash;
    server hermes-1:8080;
    server hermes-2:8080;
    server hermes-3:8080;
}

server {
    listen 80;
    server_name _;

    # Health check for the LB itself
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy all requests to upstream
    location = /admin/v1/bootstrap {
        limit_req zone=bootstrap burst=3 nodelay;
        proxy_pass http://hermes_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Proxy all requests to upstream
    location / {
        proxy_pass http://hermes_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Passive health checks — mark upstream as down after failures
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }
}

# pgBackRest Configuration — hermes stanza
# Docs: https://pgbackrest.org/configuration.html

[global]
# Repository: local filesystem (posix)
repo1-type=posix
repo1-path=/var/lib/pgbackrest

# Retention policy
repo1-retention-full=2
repo1-retention-diff=7

# Compression
compress-type=zst
compress-level=3

# Parallel processing
process-max=2

# Logging
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

# Spool path for async archiving
spool-path=/var/spool/pgbackrest

[hermes]
# PostgreSQL connection
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-user=hermes
pg1-database=hermes

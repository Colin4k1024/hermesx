replicaCount: 2

image:
  repository: hermesx/hermesx-saas
  tag: latest
  pullPolicy: IfNotPresent

args:
  - saas-api

service:
  type: ClusterIP
  port: 8080

env:
  DATABASE_URL: "postgres://hermes:changeme@postgres:5432/hermesx?sslmode=disable"
  HERMES_ACP_TOKEN: "changeme"
  SAAS_API_PORT: "8080"
  # REQUIRED: Replace with actual domain(s) before deployment. Comma-separated for multiple.
  SAAS_ALLOWED_ORIGINS: "https://your-domain.example.com"
  SAAS_STATIC_DIR: "/static"
  HERMES_API_PORT: "8081"
  HERMES_API_KEY: "changeme"
  REDIS_URL: "redis://redis:6379"
  LLM_API_URL: "http://ollama:11434"
  LLM_API_KEY: "ollama"
  LLM_MODEL: "qwen3:30b"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_ACCESS_KEY: "changeme"
  MINIO_SECRET_KEY: "changeme"
  MINIO_BUCKET: "hermesx-skills"

resources:
  limits:
    cpu: "1000m"
    memory: "512Mi"
  requests:
    cpu: "200m"
    memory: "128Mi"

probes:
  liveness:
    path: /health/live
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10

# PodDisruptionBudget — ensures availability during voluntary disruptions.
pdb:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1  # alternative to minAvailable

# HorizontalPodAutoscaler — scales based on CPU/memory utilization.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  scaleDownStabilizationSeconds: 300

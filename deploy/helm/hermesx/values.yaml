replicaCount: 2

image:
  repository: hermesx/hermesx-saas
  # Pin a release tag or digest in production. Defaults to Chart.appVersion.
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: true

args:
  - saas-api

service:
  type: ClusterIP
  port: 8080
  nodePort: null

env:
  DATABASE_URL: "postgres://hermes:changeme@postgres:5432/hermesx?sslmode=disable"
  HERMES_ACP_TOKEN: "changeme"
  SAAS_API_PORT: "8080"
  # REQUIRED: Replace with actual domain(s) before deployment. Comma-separated for multiple.
  SAAS_ALLOWED_ORIGINS: "https://your-domain.example.com"
  SAAS_STATIC_DIR: "/static"
  HERMES_API_PORT: "8081"
  HERMES_API_KEY: "changeme"
  REDIS_URL: "redis://redis:6379"
  LLM_API_URL: "http://ollama:11434"
  LLM_API_KEY: "ollama"
  LLM_MODEL: "qwen3:30b"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_ACCESS_KEY: "changeme"
  MINIO_SECRET_KEY: "changeme"
  MINIO_BUCKET: "hermesx-skills"

sandbox:
  # SaaS-only deployments must opt into a non-host execution backend. The
  # production chart default uses Kubernetes Jobs; set mode to "" to disable
  # execute_code instead of falling back to local host execution.
  mode: "k8s-job"
  k8sJob:
    namespace: ""
    image: "python:3.12-slim"
    cpuLimit: "500m"
    memoryLimit: "256Mi"
    serviceAccount: ""
    runtimeClass: "gvisor"
    rbac:
      create: true

# For production, prefer referencing a pre-created Secret instead of putting
# sensitive values directly in env above. Keys default to the env var names.
secretEnv:
  existingSecret: ""
  keys:
    DATABASE_URL: DATABASE_URL
    HERMES_ACP_TOKEN: HERMES_ACP_TOKEN
    HERMES_API_KEY: HERMES_API_KEY
    REDIS_URL: REDIS_URL
    LLM_API_KEY: LLM_API_KEY
    MINIO_ACCESS_KEY: MINIO_ACCESS_KEY
    MINIO_SECRET_KEY: MINIO_SECRET_KEY

resources:
  limits:
    cpu: "1000m"
    memory: "512Mi"
  requests:
    cpu: "200m"
    memory: "128Mi"

probes:
  liveness:
    path: /health/live
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

networkPolicy:
  enabled: false
  # Empty selectors match pods in the same namespace. Configure these for a
  # production namespace to restrict callers and dependency destinations.
  ingressFrom: []
  egressTo: []

ingress:
  enabled: false
  className: ""
  host: ""
  path: /
  annotations: {}
  tls: []

# PodDisruptionBudget — ensures availability during voluntary disruptions.
pdb:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1  # alternative to minAvailable

# HorizontalPodAutoscaler — scales based on CPU/memory utilization.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  scaleDownStabilizationSeconds: 300

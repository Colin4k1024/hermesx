apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Chart.Name }}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
        prometheus.io/path: "/metrics"
    spec:
      {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ if .Values.serviceAccount.name }}{{ .Values.serviceAccount.name }}{{ else }}{{ .Release.Name }}{{ end }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/hermesx
          args:
            {{- range .Values.args }}
            - {{ . }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: DATABASE_DRIVER
              value: {{ .Values.env.DATABASE_DRIVER | default "postgres" | quote }}
            - name: DATABASE_URL
              {{ if .Values.secretEnv.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretEnv.existingSecret | quote }}
                  key: {{ .Values.secretEnv.keys.DATABASE_URL | quote }}
              {{ else }}
              value: {{ .Values.env.DATABASE_URL | quote }}
              {{ end }}
            - name: HERMES_ACP_TOKEN
              {{ if .Values.secretEnv.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretEnv.existingSecret | quote }}
                  key: {{ .Values.secretEnv.keys.HERMES_ACP_TOKEN | quote }}
              {{ else }}
              value: {{ .Values.env.HERMES_ACP_TOKEN | quote }}
              {{ end }}
            - name: SAAS_API_PORT
              value: {{ .Values.env.SAAS_API_PORT | quote }}
            - name: SAAS_ALLOWED_ORIGINS
              value: {{ .Values.env.SAAS_ALLOWED_ORIGINS | quote }}
            - name: SAAS_STATIC_DIR
              value: {{ .Values.env.SAAS_STATIC_DIR | quote }}
            - name: SANDBOX_MODE
              value: {{ .Values.sandbox.mode | quote }}
            {{- if eq .Values.sandbox.mode "k8s-job" }}
            - name: K8S_JOB_NAMESPACE
              value: {{ .Values.sandbox.k8sJob.namespace | default .Release.Namespace | quote }}
            - name: K8S_JOB_IMAGE
              value: {{ .Values.sandbox.k8sJob.image | quote }}
            - name: K8S_JOB_CPU_LIMIT
              value: {{ .Values.sandbox.k8sJob.cpuLimit | quote }}
            - name: K8S_JOB_MEMORY_LIMIT
              value: {{ .Values.sandbox.k8sJob.memoryLimit | quote }}
            - name: K8S_JOB_SERVICE_ACCOUNT
              value: {{ .Values.sandbox.k8sJob.serviceAccount | default (.Values.serviceAccount.name | default .Release.Name) | quote }}
            - name: K8S_JOB_RUNTIME_CLASS
              value: {{ .Values.sandbox.k8sJob.runtimeClass | quote }}
            {{- end }}
            - name: HERMES_API_PORT
              value: {{ .Values.env.HERMES_API_PORT | quote }}
            - name: HERMES_API_KEY
              {{ if .Values.secretEnv.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretEnv.existingSecret | quote }}
                  key: {{ .Values.secretEnv.keys.HERMES_API_KEY | quote }}
              {{ else }}
              value: {{ .Values.env.HERMES_API_KEY | quote }}
              {{ end }}
            - name: REDIS_URL
              {{ if .Values.secretEnv.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretEnv.existingSecret | quote }}
                  key: {{ .Values.secretEnv.keys.REDIS_URL | quote }}
              {{ else }}
              value: {{ .Values.env.REDIS_URL | quote }}
              {{ end }}
            - name: LLM_API_URL
              value: {{ .Values.env.LLM_API_URL | quote }}
            - name: LLM_API_KEY
              {{ if .Values.secretEnv.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretEnv.existingSecret | quote }}
                  key: {{ .Values.secretEnv.keys.LLM_API_KEY | quote }}
              {{ else }}
              value: {{ .Values.env.LLM_API_KEY | quote }}
              {{ end }}
            - name: LLM_MODEL
              value: {{ .Values.env.LLM_MODEL | quote }}
            - name: HERMES_API_MODE
              value: {{ .Values.env.HERMES_API_MODE | default "openai" | quote }}
            - name: MINIO_ENDPOINT
              value: {{ .Values.env.MINIO_ENDPOINT | quote }}
            - name: MINIO_ACCESS_KEY
              {{ if .Values.secretEnv.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretEnv.existingSecret | quote }}
                  key: {{ .Values.secretEnv.keys.MINIO_ACCESS_KEY | quote }}
              {{ else }}
              value: {{ .Values.env.MINIO_ACCESS_KEY | quote }}
              {{ end }}
            - name: MINIO_SECRET_KEY
              {{ if .Values.secretEnv.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretEnv.existingSecret | quote }}
                  key: {{ .Values.secretEnv.keys.MINIO_SECRET_KEY | quote }}
              {{ else }}
              value: {{ .Values.env.MINIO_SECRET_KEY | quote }}
              {{ end }}
            - name: MINIO_BUCKET
              value: {{ .Values.env.MINIO_BUCKET | quote }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: 3
          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

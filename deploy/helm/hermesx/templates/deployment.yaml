apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Chart.Name }}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/hermesx
          args:
            {{- range .Values.args }}
            - {{ . }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: DATABASE_DRIVER
              value: {{ .Values.env.DATABASE_DRIVER | default "postgres" | quote }}
            - name: DATABASE_URL
              value: {{ .Values.env.DATABASE_URL | quote }}
            - name: HERMES_ACP_TOKEN
              value: {{ .Values.env.HERMES_ACP_TOKEN | quote }}
            - name: SAAS_API_PORT
              value: {{ .Values.env.SAAS_API_PORT | quote }}
            - name: SAAS_ALLOWED_ORIGINS
              value: {{ .Values.env.SAAS_ALLOWED_ORIGINS | quote }}
            - name: SAAS_STATIC_DIR
              value: {{ .Values.env.SAAS_STATIC_DIR | quote }}
            - name: HERMES_API_PORT
              value: {{ .Values.env.HERMES_API_PORT | quote }}
            - name: HERMES_API_KEY
              value: {{ .Values.env.HERMES_API_KEY | quote }}
            - name: REDIS_URL
              value: {{ .Values.env.REDIS_URL | quote }}
            - name: LLM_API_URL
              value: {{ .Values.env.LLM_API_URL | quote }}
            - name: LLM_API_KEY
              value: {{ .Values.env.LLM_API_KEY | quote }}
            - name: LLM_MODEL
              value: {{ .Values.env.LLM_MODEL | quote }}
            - name: HERMES_API_MODE
              value: {{ .Values.env.HERMES_API_MODE | default "openai" | quote }}
            - name: MINIO_ENDPOINT
              value: {{ .Values.env.MINIO_ENDPOINT | quote }}
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.env.MINIO_ACCESS_KEY | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.env.MINIO_SECRET_KEY | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.env.MINIO_BUCKET | quote }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: 3
          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

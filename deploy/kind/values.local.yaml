# Local kind deployment values
replicaCount: 1

image:
  repository: hermes-agent-saas
  tag: local
  pullPolicy: Never

service:
  type: NodePort
  port: 8080
  nodePort: 30080

args:
  - saas-api

env:
  DATABASE_URL: "postgres://hermes:hermes@postgres-postgresql:5432/hermes?sslmode=disable"
  HERMES_ACP_TOKEN: "dev-token-change-in-production"
  SAAS_API_PORT: "8080"
  SAAS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8080"
  SAAS_STATIC_DIR: "/static"
  HERMES_API_PORT: "8081"
  HERMES_API_KEY: "dev-api-key-change-in-production"
  REDIS_URL: ""
  LLM_API_URL: "http://10.191.110.127:8000/v1"
  LLM_API_KEY: "123456"
  LLM_MODEL: "Qwen3-Coder-Next-4bit"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_ACCESS_KEY: "hermes-minio"
  MINIO_SECRET_KEY: "hermes-minio-password"
  MINIO_BUCKET: "hermes-skills"

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

probes:
  liveness:
    path: /health/live
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /health/ready
    initialDelaySeconds: 10
    periodSeconds: 15

postgresql:
  enabled: false

---
# Namespace for all hermesx services.
apiVersion: v1
kind: Namespace
metadata:
  name: hermesx
---
# Secret for MySQL credentials.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: hermesx
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: hermesx-root-password
  MYSQL_DATABASE: hermesx
  MYSQL_USER: hermesx
  MYSQL_PASSWORD: hermesx-password
---
# PVC for MySQL persistent storage (survives pod restarts).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: hermesx
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
# MySQL 8.0 StatefulSet.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: hermesx
  labels:
    app: mysql
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4.6
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-data
---
# Headless service for StatefulSet DNS resolution.
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: hermesx
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306

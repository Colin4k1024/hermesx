---
# Prometheus scrape configuration for hermesx metrics.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: hermesx
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape hermesx SaaS API server metrics endpoint.
      - job_name: hermesx
        static_configs:
          - targets: ['hermesx:8080']
        metrics_path: /metrics
        scheme: http

      # Scrape Prometheus itself.
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      # Scrape MySQL exporter if deployed (optional).
      # - job_name: mysql
      #   static_configs:
      #     - targets: ['mysql-exporter:9104']
---
# PVC for Prometheus persistent storage.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: hermesx
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
# Prometheus Deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: hermesx
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      securityContext:
        fsGroup: 65534
        runAsUser: 65534
        runAsNonRoot: true
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --web.console.libraries=/usr/share/prometheus/console_libraries
            - --web.console.templates=/usr/share/prometheus/consoles
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
# Service for Prometheus.
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: hermesx
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
# NodePort service for external access (kind cluster).
apiVersion: v1
kind: Service
metadata:
  name: prometheus-nodeport
  namespace: hermesx
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30094

---
# Grafana datasource — connects to Prometheus in same namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: hermesx
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
# Grafana dashboard — hermesx agent observability.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: hermesx
data:
  default.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: hermesx
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
# hermesx Agent Dashboard JSON.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-hermesx
  namespace: hermesx
data:
  hermesx.json: |
    {
      "title": "hermesx Agent Observability",
      "uid": "hermesx-agent",
      "schemaVersion": 39,
      "refresh": "30s",
      "panels": [
        {
          "id": 1, "type": "stat", "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "title": "HTTP Requests Total",
          "targets": [{"expr": "sum(hermes_http_requests_total)", "legendFormat": "Total"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 2, "type": "stat", "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "title": "Active Sessions",
          "targets": [{"expr": "hermes_active_sessions", "legendFormat": "Active"}]
        },
        {
          "id": 3, "type": "stat", "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "title": "LLM Tokens In (total)",
          "targets": [{"expr": "sum(hermes_llm_tokens_total{direction=\"input\"})", "legendFormat": "Tokens In"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 4, "type": "stat", "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "title": "LLM Tokens Out (total)",
          "targets": [{"expr": "sum(hermes_llm_tokens_total{direction=\"output\"})", "legendFormat": "Tokens Out"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 5, "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "title": "HTTP Request Rate (req/s)",
          "targets": [{"expr": "rate(hermes_http_requests_total[1m])", "legendFormat": "{{method}} {{path}}"}]
        },
        {
          "id": 6, "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "title": "HTTP Request Duration (p50/p95/p99)",
          "targets": [
            {"expr": "histogram_quantile(0.50, rate(hermes_http_duration_seconds_bucket[1m]))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, rate(hermes_http_duration_seconds_bucket[1m]))", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, rate(hermes_http_duration_seconds_bucket[1m]))", "legendFormat": "p99"}
          ]
        },
        {
          "id": 7, "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "title": "LLM API Calls Rate",
          "targets": [{"expr": "rate(hermes_llm_api_calls_total[1m])", "legendFormat": "{{tenant}}"}]
        },
        {
          "id": 8, "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "title": "Agent Tool Invocations Rate",
          "targets": [{"expr": "rate(hermes_agent_tool_calls_total[1m])", "legendFormat": "{{tool}}"}]
        },
        {
          "id": 9, "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "title": "Memory Operations",
          "targets": [{"expr": "rate(hermes_memory_ops_total[1m])", "legendFormat": "{{operation}}"}]
        },
        {
          "id": 10, "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "title": "HTTP Error Rate (4xx/5xx)",
          "targets": [
            {"expr": "rate(hermes_http_requests_total{status=~\"4..\"}[1m])", "legendFormat": "4xx"},
            {"expr": "rate(hermes_http_requests_total{status=~\"5..\"}[1m])", "legendFormat": "5xx"}
          ]
        }
      ],
      "time": {"from": "now-1h", "to": "now"}
    }
---
# PVC for Grafana persistent storage (dashboards, plugins, DB).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: hermesx
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
# Grafana Deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: hermesx
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: hermesx-grafana
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:30095"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-hermesx
              mountPath: /var/lib/grafana/dashboards
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: dashboard-hermesx
          configMap:
            name: grafana-dashboard-hermesx
---
# Service for Grafana.
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: hermesx
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
# NodePort service for external access (kind cluster).
apiVersion: v1
kind: Service
metadata:
  name: grafana-nodeport
  namespace: hermesx
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30095

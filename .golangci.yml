# golangci-lint configuration
# See: https://golangci-lint.run/usage/configuration/

linters:
  disable-all: true
  enable:
    - forbidigo

linters-settings:
  forbidigo:
    # Forbid direct os.Getenv calls for credential keys in tool handlers.
    # Tool handlers must use tctx.SecretResolver.Resolve() instead so that
    # secrets are routed through the tenant-scoped resolver rather than the
    # ambient process environment.
    forbid:
      - pattern: '^os\.Getenv$'
        msg: "use tctx.SecretResolver.Resolve() instead of os.Getenv for credentials in tool handlers"
    analyze-types: false

issues:
  # TODO: remove exclusion after full SecretResolver migration.
  # The lines below carry a "// fallback for backward compat" comment and are
  # intentional transitional shims.  Until every tool handler has been ported
  # to SecretResolver we exclude those specific fallback call-sites so that
  # the linter runs in warn-only mode and does not break CI prematurely.
  exclude-rules:
    - linters: [forbidigo]
      text: "os\\.Getenv"
      source: "// fallback"

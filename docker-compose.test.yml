services:
  postgres-test:
    image: postgres:16
    container_name: hermesx-pg-test
    environment:
      POSTGRES_DB: hermesx_test
      POSTGRES_USER: hermesx_test
      POSTGRES_PASSWORD: hermesx_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermesx_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7
    container_name: hermesx-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio-test:
    image: minio/minio:latest
    container_name: hermesx-minio-test
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hermesx_test
      MINIO_ROOT_PASSWORD: hermesx_test
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /data

name: "🐛 Bug Report"
description: Report a bug — something that's broken, crashes, or behaves incorrectly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it quickly.

        **Before submitting**, please:
        - Search [existing issues](https://github.com/Colin4k1024/hermesx/issues) to avoid duplicates
        - Build the latest `main` branch and confirm the bug still exists

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what's broken. Include error messages, tracebacks, or screenshots if relevant.
      placeholder: |
        What happened? What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug. The more specific, the faster we can fix it.
      placeholder: |
        1. Build: `go build -o hermesx ./cmd/hermesx/`
        2. Run: `./hermesx saas-api`
        3. Call `POST /v1/chat/completions`
        4. Error appears: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include full error output if available.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of the project is affected?
      multiple: true
      options:
        - Agent Core (conversation loop, context compression, streaming)
        - LLM Client (OpenAI / Anthropic API integration)
        - Tools (terminal, files, web, browser, delegate, MCP, etc.)
        - SaaS API / Admin API
        - Channel / messaging integration
        - ACP (editor integration server)
        - Skills (loading, parsing, hub)
        - SaaS configuration / environment
        - Cron scheduler
        - Store / tenant persistence
        - Build / Cross-compilation
        - Other
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Messaging Platform (if gateway-related)
      description: Which platform adapter is affected?
      multiple: true
      options:
        - N/A
        - Telegram
        - Discord
        - Slack
        - WhatsApp
        - Signal
        - Matrix
        - Mattermost
        - DingTalk
        - Feishu
        - WeCom
        - Email
        - SMS
        - Webhook
        - API Server
        - Home Assistant

  - type: input
    id: os
    attributes:
      label: Operating System
      description: "e.g. Ubuntu 24.04, Kubernetes 1.30 node image, container runtime"
      placeholder: "Ubuntu 24.04 (amd64)"
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go Version
      description: "Output of `go version`"
      placeholder: "go1.25.0 linux/amd64"
    validations:
      required: true

  - type: input
    id: hermes-version
    attributes:
      label: HermesX Version
      description: "Output of `./hermesx version`, or the commit hash you built from"
      placeholder: "dev (commit 1a75f00)"

  - type: textarea
    id: health-output
    attributes:
      label: SaaS health output
      description: Paste `/health/live`, `/health/ready`, or `docker compose -f docker-compose.saas.yml ps` output.
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Error Output
      description: Paste any error output, logs, or stack traces. This will be auto-formatted as code.
      render: shell

  - type: textarea
    id: root-cause
    attributes:
      label: Root Cause Analysis (optional)
      description: |
        If you've dug into the code and identified the root cause, share it here.
        Include file paths, line numbers, and code snippets if possible. This massively speeds up fixes.
      placeholder: |
        The bug is in `internal/gateway/runner.go` line 206. The `IsUserAllowed()`
        check returns true by default because `LoadAllowedUsers()` is never called...

  - type: textarea
    id: proposed-fix
    attributes:
      label: Proposed Fix (optional)
      description: If you have a fix in mind (or a PR ready), describe it here.

  - type: checkboxes
    id: pr-ready
    attributes:
      label: Contribution
      options:
        - label: I'd like to fix this myself and submit a PR

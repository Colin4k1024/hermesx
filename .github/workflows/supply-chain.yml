name: Supply Chain Artifacts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sbom:
    name: Generate SBOMs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            webui/package-lock.json

      - name: Generate Go CycloneDX SBOM
        run: |
          mkdir -p sbom
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.10.0
          cyclonedx-gomod mod -licenses -json -output sbom/hermesx-go.cdx.json

      - name: Generate root npm CycloneDX SBOM
        run: |
          npm ci
          npx --yes @cyclonedx/cyclonedx-npm@5.0.0 --package-lock-only --output-file sbom/hermesx-root-npm.cdx.json

      - name: Generate WebUI npm CycloneDX SBOM
        working-directory: webui
        run: |
          npm ci
          npx --yes @cyclonedx/cyclonedx-npm@5.0.0 --package-lock-only --output-file ../sbom/hermesx-webui-npm.cdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hermesx-sbom
          path: sbom/*.cdx.json
          retention-days: 30

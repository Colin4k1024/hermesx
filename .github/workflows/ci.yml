name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test ./... -short -count=1 -timeout 120s -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Coverage summary
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "### Test Coverage: ${total}" >> $GITHUB_STEP_SUMMARY

      - name: Race detection
        run: go test -race ./internal/agent/... ./internal/tools/... ./internal/gateway/... -count=1 -short -timeout 60s

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files need formatting:"
            echo "$unformatted"
            exit 1
          fi

  build-matrix:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w" -o hermesx-${{ matrix.os }}-${{ matrix.arch }}${ext} ./cmd/hermesx/

      - uses: actions/upload-artifact@v4
        with:
          name: hermesx-${{ matrix.os }}-${{ matrix.arch }}
          path: hermesx-*

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} \
                       -t ${{ env.IMAGE }}:latest .

      - name: Smoke test
        run: |
          docker run --rm ${{ env.IMAGE }}:${{ github.sha }} version

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hermesx_test
          POSTGRES_USER: hermesx_test
          POSTGRES_PASSWORD: hermesx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hermesx_test -d hermesx_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://hermesx_test:hermesx_test@localhost:5432/hermesx_test?sslmode=disable
      TEST_MINIO_ENDPOINT: localhost:9000
      TEST_MINIO_ACCESS_KEY: hermesx_test
      TEST_MINIO_SECRET_KEY: hermesx_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=hermesx_test \
            -e MINIO_ROOT_PASSWORD=hermesx_test \
            minio/minio server /data
          echo "Waiting for MinIO..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then break; fi
            sleep 1
          done

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            if bash -c 'echo > /dev/tcp/localhost/5432' 2>/dev/null; then echo "PostgreSQL ready"; break; fi
            if [ $i -eq 30 ]; then echo "PostgreSQL timeout"; exit 1; fi
            sleep 1
          done
          echo "Waiting for Redis..."
          for i in $(seq 1 30); do
            if bash -c 'echo > /dev/tcp/localhost/6379' 2>/dev/null; then echo "Redis ready"; break; fi
            if [ $i -eq 30 ]; then echo "Redis timeout"; exit 1; fi
            sleep 1
          done
          echo "All services ready."

      - name: Run integration tests
        run: go test -tags=integration -v -count=1 -timeout=300s ./tests/integration/...

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test ./... -count=1 -short -timeout 120s

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          DATE=$(date -u +"%Y-%m-%d")
          COMMIT=${GITHUB_SHA::8}
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.releaseDate=${DATE} -X main.commit=${COMMIT}"

          platforms=(
            "linux/amd64"
            "linux/arm64"
          )

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            output="dist/hermesx-saas-${os}-${arch}"
            echo "Building ${output}..."

            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -ldflags="$LDFLAGS" -o "$output" ./cmd/hermesx/
          done

          # Create checksums
          cd dist && sha256sum hermesx-saas-* > checksums.txt

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*'

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test ./... -count=1 -short -timeout 120s

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          DATE=$(date -u +"%Y-%m-%d")
          COMMIT=${GITHUB_SHA::8}
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.releaseDate=${DATE} -X main.commit=${COMMIT}"

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi

            output="dist/hermesx-${os}-${arch}${ext}"
            echo "Building ${output}..."

            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -ldflags="$LDFLAGS" -o "$output" ./cmd/hermesx/
          done

          # Create checksums
          cd dist && sha256sum hermesx-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          files: dist/*
          generate_release_notes: true
          draft: false

version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      root-npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /webui
    schedule:
      interval: weekly
    groups:
      webui-npm-dependencies:
        patterns:
          - "*"
    ignore:
      # typescript-eslint 要求 peer typescript ">=4.8.4 <6.1.0"，
      # 暂不升级 typescript 主版本，避免 ERESOLVE 冲突（见 PR #87）。
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /webui
    schedule:
      interval: weekly

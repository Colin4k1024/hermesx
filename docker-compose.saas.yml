services:
  postgres:
    image: postgres:16
    container_name: hermes-pg
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: hermes-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hermes-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  hermes-saas:
    build:
      context: .
      dockerfile: Dockerfile.saas
    container_name: hermes-saas
    command: ["saas-api"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-hermes-skills}
      SAAS_API_PORT: "8080"
      SAAS_ALLOWED_ORIGINS: ${SAAS_ALLOWED_ORIGINS:?SAAS_ALLOWED_ORIGINS must be set explicitly}
      SAAS_STATIC_DIR: /static
      HERMES_ACP_TOKEN: ${HERMES_ACP_TOKEN}
      HERMES_API_KEY: ${HERMES_API_KEY}
      HERMES_API_PORT: "8081"
      LLM_API_URL: ${LLM_API_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-qwen3:30b}
      HERMES_MODEL: ${HERMES_MODEL:-qwen3:30b}
      HERMES_PROVIDER: ${HERMES_PROVIDER:-openai}
      HERMES_BASE_URL: ${HERMES_BASE_URL}
      HERMES_API_KEY_LLM: ${HERMES_API_KEY_LLM}
      HERMES_API_MODE: ${HERMES_API_MODE:-openai}
      HERMES_DEBUG: ${HERMES_DEBUG:-false}
    volumes:
      - ./skills:/home/hermes/skills:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "18080:8080"
      - "18081:8081"

volumes:
  postgres_data:
  redis_data:
  minio_data:

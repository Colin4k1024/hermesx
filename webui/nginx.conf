limit_req_zone $binary_remote_addr zone=bootstrap:10m rate=5r/m;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'" always;

    # SSE: disable buffering + extend timeouts for streaming chat
    location /v1/chat/ {
        proxy_pass http://${HERMES_BACKEND_URL}/v1/chat/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
        add_header X-Accel-Buffering no;
    }

    # One-time bootstrap is public except for ACP token auth, so keep a narrow IP limiter here.
    location = /admin/v1/bootstrap {
        limit_req zone=bootstrap burst=3 nodelay;
        proxy_pass http://${HERMES_BACKEND_URL}/admin/v1/bootstrap;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Admin API proxy (must come before /admin/ static block)
    location /admin/v1/ {
        proxy_pass http://${HERMES_BACKEND_URL}/admin/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Admin Console SPA fallback — serves admin.html for all /admin/* paths
    location /admin {
        try_files $uri $uri/ /admin.html;
    }

    # User API proxy
    location /v1/ {
        proxy_pass http://${HERMES_BACKEND_URL}/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_connect_timeout 10s;
    }

    location /health {
        proxy_pass http://${HERMES_BACKEND_URL}/health;
        proxy_read_timeout 10s;
    }

    # User Portal SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}

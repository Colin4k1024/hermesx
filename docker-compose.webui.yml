services:
  postgres:
    image: postgres:16
    container_name: hermesx-pg
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermes}
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermes}
    volumes:
      - hermesx_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermesx"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: hermesx-redis
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes;
      else
        redis-server --appendonly yes;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - hermesx_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: hermesx-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hermes}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-hermesxpass}
    volumes:
      - hermesx_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  hermesx-saas:
    build:
      context: .
      dockerfile: Dockerfile.saas
    container_name: hermesx-saas
    command: ["saas-api"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@postgres:5432/${POSTGRES_DB:-hermes}?sslmode=disable
      REDIS_URL: ${REDIS_PASSWORD:+redis://default:${REDIS_PASSWORD}@redis:6379}${REDIS_PASSWORD:-redis://redis:6379}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hermes}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-hermesxpass}
      MINIO_BUCKET: hermes-skills
      SAAS_API_PORT: "8080"
      SAAS_ALLOWED_ORIGINS: ${SAAS_ALLOWED_ORIGINS:-http://localhost:3000}
      SAAS_STATIC_DIR: /static
      HERMES_ACP_TOKEN: ${HERMES_ACP_TOKEN:-dev-bootstrap-token}
      LLM_API_URL: ${LLM_API_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      HERMES_DEBUG: "false"
    volumes:
      - ./skills:/home/hermesx/skills:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  bootstrap:
    image: alpine:3.19
    container_name: hermesx-bootstrap
    command: >
      sh -c "apk add --no-cache bash curl ca-certificates 2>/dev/null
             && /scripts/bootstrap.sh"
    volumes:
      - ./scripts:/scripts:ro
      - ./tests/fixtures:/fixtures
    environment:
      BASE_URL: http://hermesx-saas:8080
      HERMES_ACP_TOKEN: ${HERMES_ACP_TOKEN:-dev-bootstrap-token}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hermes}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-hermesxpass}
      MINIO_BUCKET: hermes-skills
      FIXTURES_DIR: /fixtures
    depends_on:
      hermesx-saas:
        condition: service_healthy
    restart: "no"

  hermesx-webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
    container_name: hermesx-webui
    environment:
      HERMES_BACKEND_URL: hermesx-saas:8080
    ports:
      - "3000:80"
    depends_on:
      hermesx-saas:
        condition: service_healthy

volumes:
  hermesx_postgres_data:
  hermesx_redis_data:
  hermesx_minio_data:
